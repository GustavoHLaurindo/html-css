<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style>
        abbr{
           cursor: help;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags html</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <h3>Em HTML5, podemos inserir os elementos da lista a seguir.passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</h3>
    <ul type="square" style="font-size: 20px;">
        <li><abbr title="Use a tag &lt;p&gt;">parágrafo</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;title&gt;">Titulos</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;abbr&gt;">abreviações</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;a&gt;">links/âncora</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;ul&gt;">Listas não ordenadas</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;br&gt;">Quebra de linha</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;img&gt;">Imagens</abbr></li>
        <br>
        <li><abbr title="Use a tag &lt;code&gt;">Codigo-fonte</abbr></li>
    </ul>

</body>
</html>
