         div > p{

         }
         div:hover > p{
             display: block;
             background-image: linear-gradient(to right, black,white) ;
             color: yellow;
             width: 200px;
         }
         div{
             width: 200px;
             font-family: Arial, Helvetica, sans-serif;
             font-size: 1.5em;
         }

     </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo </title>
</head>
<body>
    <h1 class="principal">Tem uma coisa importante escondida no texto abaixo</h1>
    <div>
        passe aqui para descobrir
        <p>VOCÊÊÊÊÊÊÊÊ!!</p>
    </div>
    
</body>
</html>
