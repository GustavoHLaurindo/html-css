<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            height: 97vh;
            background-image: url('https://i.pinimg.com/736x/e9/29/7d/e9297de90f1957b0c2c81521a143bb0e.jpg');
            background-size: 100px ;
            background-repeat: no-repeat;
            background-position: center center ;
            border: 1px dashed black;
        }
        div.bola{
            height: 300px;
            width: 300px;
            border-top-right-radius: 50%;
            border-bottom-right-radius: 50%;
            border-bottom-left-radius: 50%;
            background-image: linear-gradient(to bottom, purple, rgb(204, 7, 204));
        }
        div.bola > div.bolinha{
            height: 250px;
            width: 250px;
            border-top-right-radius: 50%;
            border-bottom-right-radius: 50%;
            border-bottom-left-radius: 50%;
            background-image: linear-gradient(to bottom, rgb(3, 202, 3),rgb(0, 132, 255));

        }
    </style>
    <title>Posicionamento</title>
</head>
<body>
    <div class="bola">
        <div class="bolinha"></div>
    </div>
    
</body>
</html>
