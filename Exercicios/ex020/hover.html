<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div:hover{
            color: red;
            
        }
        div:hover > p{
            display: block;
            background-color: rgb(216, 216, 113);
            color: rgb(126, 126, 3);
            width: 200px;

        }
        div > p{
            display: none;
        }
        
    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>passe o mouse sobre o texto abaixo</p>
    <div>
        passe o mouse aqui
        <p>TEXTO ESCONDIDO... </p>
    </div>
    
</body>
</html>
