<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="Iconsmind-Outline-Rock-andRoll.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semântica</title>
    <style>
        body{
            background-color: rgb(0, 0, 0);
        }
        h1{
            color: rgb(94, 255, 0);
            text-align: center;
        }
        mark{
            background-color: chartreuse;
        }
        h2,h3{
            color: whitesmoke;
            text-align: center;
        }
        em{
            color: rgb(238, 255, 0);
        }
        hr{
           background-color: yellow;
           width: 200px;
        }
        strong{
            background-color: rgb(145, 189, 197);
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
   <h1>principais formatações</h1>
   <hr>
   <h2>isso é importante <mark>então utilizamos de MARK</mark></h2>
   <hr>
   <h1>italicos</h1>
   <h3>podemos deixar textos italicos assim:<em>Agora essa frase estará italica</em></h3>  
   <hr> 
   <h1>Negrito</h1>
   <h3>Podemos deixar frases em negrito para maior destaque assim:<strong>Essa frase está em negrito</strong> ultilizando do <mark>STRONG</mark></h3>

</body>
</html>
