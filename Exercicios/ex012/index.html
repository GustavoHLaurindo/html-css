<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo Video Localmente</h1>
    <p>este video está hospedado no meu proprio servidor</p>
    <video controls width="500px" poster="poster/unnamed.jpg">
        <source src="videos/video.mp4" type="video/mp4" >
    </video>
    <h1>Inserrindo Videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/WHykRB2s6ok" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    
</body>
</html>
